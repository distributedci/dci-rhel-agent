---
- project:
    name: dci-rhel-agent
    queue: dci
    vars:
      registry: quay.io
      tag: "distributedci/dci-rhel-agent-8"
      version: latest
    check:
      jobs:
        - dci-build-container-job
        - dci-rpm-build-el8
        - dci-rpm-build-el9:
            voting: false
    gate:
      jobs:
        - dci-build-container-job
        - dci-rpm-build-el8
    dci-post:
      jobs:
        - dci-build-and-push-container-job
        - dci-rpm-build-with-doc-el8
        - dci-rpm-publish:
            dependencies:
              - dci-rpm-build-with-doc-el8
...
