---
- name: 'Add job state error'
  delegate_to: localhost
  dci_job:
    id: "{{ hostvars.localhost.job_id }}"
    status: "error"
  tags: dci

- name: 'Collect logs on error'
  delegate_to: localhost
  block:
    - name: 'Create temp dir for error logs if not exists'
      include_tasks: create_temp_dir.yml
      when: job_logs is not defined

    - name: 'Upload error logs to DCI Control server'
      include_tasks: logs.yml
  rescue:
    - name: 'Log collection failed during error'
      debug:
        msg: 'Warning: Could not collect logs during error handling'

- name: 'Job in error'
  fail:
    msg: 'Something went wrong. Review the log at: https://www.distributed-ci.io/jobs/{{ hostvars.localhost.job_id }}/jobStates'

