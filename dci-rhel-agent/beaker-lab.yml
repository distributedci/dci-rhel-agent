---
- name: Ensure tftp and tftp-server installed
  package:
    name: "{{ item }}"
  with_items:
    - tftp
    - tftp-server

- name: Enable tftp server
  ansible.builtin.systemd:
    name: tftp
    state: started
    enabled: true

- name: Set tftp_home_dir flag on and keep it persistent across reboots
  seboolean:
    name: tftp_home_dir
    state: true
    persistent: true

- name: Update beaker.conf file
  template:
    src: /usr/share/dci-rhel-agent/templates/beaker.conf.j2
    dest: /etc/dnsmasq.d/beaker.conf
  register: dns_conf_update

- name: Restart dnsmasq if any config files were changed
  service:
    name: dnsmasq
    state: restarted
  when: dns_conf_update.changed | default('false') | bool

- name: Ensure Beaker is up to date on jumpbox
  yum:
    name: beaker-client
    state: latest

- name: Query systems list
  command: bkr system-list
  register: bkr_systems
  changed_when: false
  become: true
  failed_when: false

- debug:
    msg: "Current Beaker Systems: {{ bkr_systems.stdout_lines }}"

- name: Update power settings for each existing test system (requires Beaker 28+)
  command: >
    bkr system-modify
    --power-type={{ item.value.power_type }}
    --power-address={{ item.value.power_address }}
    --power-user={{ item.value.power_user }}
    --power-password={{ item.value.power_password }}
    --power-id={{ item.value.power_id| default('') }}
    {{ item.value.fqdn }}
  when:
    - item.value.fqdn in bkr_systems.stdout_lines
  become: true
  loop: "{{ q('dict', beaker_lab.system_inventory | default({})) }}"

- name: Create any systems in Beaker which were not already present
  command: >
    bkr system-create
    --lab-controller={{ jumpbox }}.{{ domain }}
    --arch={{ item.value.arch }}
    --power-type={{ item.value.power_type }}
    --power-address={{ item.value.power_address }}
    --power-user={{ item.value.power_user }}
    --power-password={{ item.value.power_password }}
    --power-id={{ item.value.power_id| default('') }}
    --condition=Automated
    --release-action=LeaveOn
    {{ item.value.fqdn }}
  when:
    - item.value.fqdn not in bkr_systems.stdout_lines
  become: true
  loop: "{{ q('dict', beaker_lab.system_inventory | default({})) }}"

- name: Destroy vms
  include_role:
    name: destroy_vms

- name: Setup VM host software
  include_role:
    name: setup_vm_host_software

- name: Create vms
  include_role:
    name: create_vms

- name: Setup Virtual BMC
  include_role:
    name: setup_virtual_bmc
