---
- name: Upload .composeinfo to DCI Control Server
  delegate_to: localhost
  dci_file:
    path: "/data/{{ topic_name }}/.composeinfo"
    name: 'composeinfo.txt'
    mime: 'text/plain'
    job_id: '{{ job_id }}'

- name: Process ComposeInfo
  compose_info:
    compose_path: "/data/{{ topic_name }}"
    arch: "{{ system_arch }}"
  register: results

- name: Set Composeinfo
  set_fact:
    compose_info: "{{ results.compose_info }}"
    os_major_modified: "{{ results.compose_info.osmajor | replace('RedHatEnterpriseLinux9', 'CentOSStream9') }}" # Use CentOSStream9 for RHEL9

- name: Sync harness repo
  shell: >
    dnf reposync --repo=rstrnt_harness \
      --repofrompath=rstrnt_harness,https://beaker-project.org/yum/harness/{{ os_major_modified }} \
      --delete \
      --download-metadata \
      --download-path /data/beaker/harness/{{ compose_info.osmajor }}

- name: Create harness repo
  shell: createrepo -q /data/beaker/harness/{{ compose_info.osmajor }}
