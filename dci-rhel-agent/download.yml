---
- name: Set compose ID for current topic
  set_fact:
    compose_id: >-
      {{
        (components | selectattr('type', 'equalto', 'compose')
        | map(attribute='display_name') | list | first)
      }}

- name: Set compose version from compose ID
  set_fact:
    compose_version: >-
      {{
        (compose_id.split('-')[1]) if (compose_id | default('') | length > 0) else ''
      }}

- name: Resolve compose minor from compose ID
  set_fact:
    compose_minor: >-
      {{
        (compose_version.split('.')[1]) if (compose_version | length > 0) else ''
      }}

- name: Set topic name directory based on compose ID
  set_fact:
    topic_name_resolved: >-
      {{
        topic_name
          if ('*' not in topic_name) or (compose_minor | length == 0)
          else topic_name.replace('*', compose_minor)
      }}

- name: Build RHDL download options for current topic
  set_fact:
    rhdl_archs: "{{ (archs | default([])) | join(',') }}"
    rhdl_variants: "{{ (variants | default([])) | join(',') }}"
    rhdl_tags: >-
      {{
        (filters | default([]) |
         selectattr('type', 'equalto', 'compose') |
         map(attribute='tag') | list)
        | join(',')
      }}

- name: Build RHDL flags for current topic
  set_fact:
    rhdl_flags: >-
      {%- set flags = [] -%}
      {%- if rhdl_archs|length > 0 -%}
      {%-   set _ = flags.append('--arch ' ~ rhdl_archs) -%}
      {%- endif -%}
      {%- if rhdl_variants|length > 0 -%}
      {%-   set _ = flags.append('--variant ' ~ rhdl_variants) -%}
      {%- endif -%}
      {%- if with_debug | default(false) -%}
      {%-   set _ = flags.append('--with-debug') -%}
      {%- endif -%}
      {%- if rhdl_tags | length > 0 -%}
      {%-   set _ = flags.append('--tag ' ~ rhdl_tags) -%}
      {%- endif -%}
      {{ flags | join(' ') }}

- name: Download compose for current topic with RHDL
  environment:
    - DCI_CLIENT_ID: "{{ dci_client_id }}"
    - DCI_API_SECRET: "{{ dci_api_secret }}"
    - DCI_CS_URL: "{{ dci_cs_url }}"
  shell: >
    rhdl download {{ compose_id }}
    --destination /data/{{ topic_name_resolved }}/compose
    --flat
    {{ rhdl_flags }}
  become: true
