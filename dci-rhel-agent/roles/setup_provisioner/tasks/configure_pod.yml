- name: Create temp dir
  tempfile:
    state: directory
  register: config_file

- name: Create directory to hold files
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ file_owner }}"
    group: "{{ file_group }}"
    mode: 0777
    recurse: yes
  loop:
    - "{{ provisioner_dir }}/redis"
    - "{{ provisioner_dir }}/tftpboot"
    - "{{ provisioner_dir }}/templates"

- name: Gather info about specific pods
  containers.podman.podman_pod_info:
    name: "{{ pod_name }}"
  register: pod_details

- name: Remove Pod
  containers.podman.podman_pod:
    name: "{{ pod_name }}"
    state: absent
  when: (pod_details.pods | length) > 0

- name: Process templates
  template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: 0644
    trim_blocks: true
    lstrip_blocks: true
  loop:
    - src: pod.yml.j2
      dest: "{{ config_file.path }}/pod.yml"
    - src: configmap.yml.j2
      dest: "{{ config_file.path }}/configmap.yml"

- name: Play kube file
  containers.podman.podman_play:
    kube_file: "{{ config_file.path }}/pod.yml"
    configmap: "{{ config_file.path }}/configmap.yml"
    recreate: true
    network: host
    state: created

- name: Copy the systemd service file
  copy:
    content: |
      [Unit]
      Description=Podman dci-provisioner.service
      After=syslog.target network.target
      [Service]
      Restart=no
      ExecStart=/usr/bin/podman pod start {{ pod_name }}
      ExecStop=/usr/bin/podman pod stop -t 10 {{ pod_name }}
      KillMode=none
      Type=forking
      [Install]
      WantedBy=default.target
    dest: "/etc/systemd/system/dci-provisioner.service"
    mode: 0644

- name: Reload systemd service
  systemd:
    daemon_reexec: yes
    scope: system

- name: Enable dci-provisioner.service
  systemd:
    name: dci-provisioner
    enabled: yes
    scope: system

- name: Start dci-provisioner.service
  systemd:
    name: dci-provisioner
    state: started
    scope: system
