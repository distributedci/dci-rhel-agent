---
- name: 'Add job state failure'
  delegate_to: localhost
  dci_job:
    id: "{{ hostvars.localhost.job_id }}"
    status: "failure"
  tags: dci

- name: 'Collect logs on failure'
  delegate_to: localhost
  block:
    - name: 'Create temp dir for failure logs if not exists'
      include_tasks: create_temp_dir.yml
      when: job_logs is not defined

    - name: 'Upload failure logs to DCI Control server'
      include_tasks: logs.yml
  rescue:
    - name: 'Log collection failed during failure'
      debug:
        msg: 'Warning: Could not collect logs during failure handling'

- name: 'Failed job'
  fail:
    msg: 'Something went wrong. Review the log at: https://www.distributed-ci.io/jobs/{{ hostvars.localhost.job_id }}/jobStates'
