---
- name: Setup Beaker
  hosts: beaker_server
  gather_facts: true
  vars:
    jumpbox_fqdn: "{{ jumpbox }}.{{ domain }}"
    beaker_dir: "{{ beaker_lab.beaker_dir }}"
  tasks:
    - name: Setup SUT host network
      include_role:
        name: setup_sut_network
    - name: Generate /etc/hosts
      lineinfile:
        dest: /etc/hosts
        line: '{{ item.value.ip_address }} {{ item.key }} {{ item.value.fqdn }}'
      loop: "{{ q('dict', beaker_lab.system_inventory | default({})| combine({jumpbox: {'fqdn': jumpbox_fqdn, 'ip_address': machine_network_ip}})) }}"
    - name: "Setup beaker"
      include_role:
        name: setup_beaker
    - name: "Add SUT's to beaker"
      include_tasks: beaker-lab.yml
      when:
        - beaker_lab is defined
        - beaker_lab | length > 0
