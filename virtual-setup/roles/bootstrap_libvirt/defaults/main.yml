---
libvirt_image_path: /var/lib/libvirt/images
kvm_guest_image_source_path: "{{ libvirt_image_path }}/CentOS-Stream-GenericCloud-8-20220913.0.x86_64.qcow2"
efi: false
networks:
- name: default
- name: rhel_prov
vms:
- name: jumpbox
  add_dci_user: true
  networks:
  - default
  - rhel_prov
- name: sut
  add_dci_user: false
  networks:
  - rhel_prov
