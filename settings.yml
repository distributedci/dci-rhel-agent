---
local_repo: /opt/dci

topics:
  - topic: RHEL-8.*
    # variants:
    #   - AppStream
    #   - BaseOS
    # archs:
    #   - x86_64
    # with_debug: false
    # dci_rhel_agent_cert: false
    # dci_rhel_agent_cki: false
    systems:
      - fqdn: sut1.dci.local
        efi: true
      - fqdn: sut2.dci.local
        efi: false

#
# The sut_interface is the network where all the SUT's are.  Normally this network
# is managed by beaker.  If you are using an external beaker instance you only need to
# define the domain and beaker_fqdn and need to remove beaker_lab dictionary.
#
sut_interface: eno2
domain: dci.local
jumpbox: "dci-jumpbox"
machine_network_cidr: 10.60.0.0/24
machine_network_ip: "{{ machine_network_cidr | nthhost(190) }}"
beaker_lab:
  beaker_dir: /opt/beaker
  dns_server: "{{ machine_network_ip }}"
  router: "{{ machine_network_ip }}"
  dhcp_start: "{{ machine_network_cidr | ipaddr('20') | ipaddr('address') }}"
  dhcp_end: "{{ machine_network_cidr | ipaddr('100') | ipaddr('address') }}"

  system_inventory:
    sut1:
      fqdn: "sut1.{{ domain }}"
      ip_address: 10.60.0.51
      mac: "52:54:00:EF:C0:2C"
      arch: x86_64
      mode: efi
      power_address: "{{ jumpbox }}.{{ domain }}"
      power_user: admin
      power_password: password
      power_type: ipmitool_lanplus
      type: virtual
      disks:
        main: 150
      memory: "16384"
      vcpu: "4"

    sut2:
      fqdn: "sut2.{{ domain }}"
      ip_address: 10.60.0.52
      mac: "52:54:00:EF:C0:2D"
      arch: x86_64
      mode: legacy
      power_address: "{{ jumpbox }}.{{ domain }}"
      power_user: admin
      power_password: password
      power_type: ipmitool_lanplus
      type: virtual
      disks:
        main: 150
      memory: "16384"
      vcpu: "4"
