[tox]
skipsdist = True
envlist = pep8,py36

[testenv]
deps = -r{toxinidir}/requirements.txt
       -r{toxinidir}/test-requirements.txt
install_command = pip install -U {packages}
whitelist_externals = sh
setenv =
    PYTHONPATH = {toxinidir}
commands =
    py.test -v {posargs}

[testenv:pep8]
commands = flake8 --ignore=E501,W503 --show-source dci-rhel-agent tests
